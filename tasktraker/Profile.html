<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Time Table Tracker</title>
</head>
<body>

<h1>⏱️ Smart Time Table Tracker</h1>

<!-- SIGN UP -->
<h2>Sign Up</h2>
<input id="signupName" type="text" placeholder="Enter Name"><br>
<input id="signupEmail" type="email" placeholder="Enter Email"><br>
<input id="signupPassword" type="password" placeholder="Enter Password"><br>
<button onclick="signUp()">Sign Up</button>

<!-- SIGN IN -->
<h2>Sign In</h2>
<input id="loginEmail" type="email" placeholder="Enter Email"><br>
<input id="loginPassword" type="password" placeholder="Enter Password"><br>
<button onclick="signIn()">Sign In</button>

<hr>

<!-- PROFILE -->
<h2>Profile</h2>
<p>Name: <span id="profileName">-</span></p>
<p>Email: <span id="profileEmail">-</span></p>

<script>
let user = {};

function signUp() {
    user.name = document.getElementById("signupName").value;
    user.email = document.getElementById("signupEmail").value;
    user.password = document.getElementById("signupPassword").value;

    alert("Sign Up Successful!");
}

function signIn() {
    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    if (email === user.email && password === user.password) {
        document.getElementById("profileName").innerText = user.name;
        document.getElementById("profileEmail").innerText = user.email;
        alert("Login Successful!");
    } else {
        alert("Invalid Details!");
    }
}
</script>

</body>
</html>
