<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Time Table App</title>
</head>
<body>

    <h1>⏱️ My Time Table App</h1>

    <!-- Task Input -->
    <h2>Add Task</h2>
    <input type="text" placeholder="Enter task">
    <input type="time">
    <button>Add</button>

    <!-- Task List -->
    <h2>Today's Tasks</h2>
    <ul>
        <li>
            <input type="checkbox">
            Study HTML - 10:00 AM
        </li>
        <li>
            <input type="checkbox">
            Workout - 6:00 PM
        </li>
    </ul>

    <!-- Progress -->
    <h2>Progress</h2>
    <p>Completed: 0/2</p>

    <!-- Reward -->
    <h2>Reward</h2>
    <p>No reward yet 😅</p>

</body>
</html>
